name: Release CI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-docker:
    name: Build Docker image with TORUSd daemon
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/torus-economy/torusd
          tags: |
            type=semver,pattern={{version}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/386,linux/arm/v7
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          target: torusd-unix
          tags: ${{ steps.meta.outputs.tags }}
          file: Dockerfile

  build-unix:
    name: Build TORUS-Qt wallet for Unix systems
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install zip tool
        run: sudo apt-get install zip -y

      - name: Build TORUS-Qt
        run: DOCKER_BUILDKIT=1 docker build --target torus-qt-unix --tag torus-qt-unix:latest .

      - name: Copy artifacts
        run: docker cp $(docker create --rm torus-qt-unix):/opt/TORUS-Qt TORUS-Qt

      - name: Zip artifacts
        run: zip torus-qt-unix.zip TORUS-Qt

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "torus-qt-unix.zip"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: Build TORUS-Qt wallet for Windows systems
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install zip tool
        run: sudo apt-get install zip -y

      - name: Build TORUS-Qt.exe
        run: DOCKER_BUILDKIT=1 docker build --target torus-qt-win --tag torus-qt-win:latest .

      - name: Copy artifacts
        run: docker cp $(docker create --rm torus-qt-win):/opt/torus-core/release/TORUS-Qt.exe TORUS-Qt.exe

      - name: Zip artifacts
        run: zip torus-qt-win64.zip TORUS-Qt.exe

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "torus-qt-win64.zip"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: Build TORUS-Qt wallet for macOS
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install boost berkeley-db@5 miniupnpc qrencode qt@5 openssl@1.1
          brew link qt@5 --force

      - name: Build TORUS-Qt
        run: |
          BOOST_PREFIX=$(brew --prefix boost)
          BDB_PREFIX=$(brew --prefix berkeley-db@5)
          OPENSSL_PREFIX=$(brew --prefix openssl@1.1)
          QT_PREFIX=$(brew --prefix qt@5)
          MINIUPNPC_PREFIX=$(brew --prefix miniupnpc)
          QRENCODE_PREFIX=$(brew --prefix qrencode)

          export PATH="$QT_PREFIX/bin:$PATH"
          export LDFLAGS="-L$QT_PREFIX/lib -L$OPENSSL_PREFIX/lib -L$BDB_PREFIX/lib -L$BOOST_PREFIX/lib"
          export CPPFLAGS="-I$QT_PREFIX/include -I$OPENSSL_PREFIX/include -I$BDB_PREFIX/include -I$BOOST_PREFIX/include"
          export PKG_CONFIG_PATH="$QT_PREFIX/lib/pkgconfig"
          qmake \
            RELEASE=1 \
            USE_QRCODE=1 \
            USE_UPNP=1 \
            BOOST_INCLUDE_PATH=$BOOST_PREFIX/include \
            BOOST_LIB_PATH=$BOOST_PREFIX/lib \
            OPENSSL_INCLUDE_PATH=$OPENSSL_PREFIX/include \
            OPENSSL_LIB_PATH=$OPENSSL_PREFIX/lib \
            BDB_INCLUDE_PATH=$BDB_PREFIX/include \
            BDB_LIB_PATH=$BDB_PREFIX/lib \
            MINIUPNPC_INCLUDE_PATH=$MINIUPNPC_PREFIX/include \
            MINIUPNPC_LIB_PATH=$MINIUPNPC_PREFIX/lib \
            QRENCODE_INCLUDE_PATH=$QRENCODE_PREFIX/include \
            QRENCODE_LIB_PATH=$QRENCODE_PREFIX/lib \
            torus.pro
          make -j$(sysctl -n hw.ncpu)

      - name: Create app bundle
        run: |
          QT_PREFIX=$(brew --prefix qt@5)
          mkdir -p TORUS-Qt.app/Contents/MacOS
          mkdir -p TORUS-Qt.app/Contents/Resources
          cp TORUS-Qt TORUS-Qt.app/Contents/MacOS/
          cat > TORUS-Qt.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>TORUS-Qt</string>
            <key>CFBundleIdentifier</key>
            <string>cc.torus.wallet</string>
            <key>CFBundleName</key>
            <string>TORUS-Qt</string>
            <key>CFBundleVersion</key>
            <string>1.0.3</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          PLIST
          $QT_PREFIX/bin/macdeployqt TORUS-Qt.app
          zip -r torus-qt-macos.zip TORUS-Qt.app

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "torus-qt-macos.zip"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
